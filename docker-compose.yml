services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      CELERY_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      AUTH_ENABLED: "true"
      DEBUG: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  celery-worker:
    build:
      context: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env.docker
    environment:
      CELERY_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      AUTH_ENABLED: "true"
      DEBUG: "false"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env.docker
    environment:
      CELERY_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      AUTH_ENABLED: "true"
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
