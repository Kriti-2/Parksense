services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./backend/.env.docker
    environment:
      - CELERY_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - AUTH_ENABLED=true
      - DEBUG=false
      - FRONTEND_URL
    volumes:
      - .:/app/root
      - ./backend/data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  celery-worker:
    build:
      context: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env.docker
    environment:
      - CELERY_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - AUTH_ENABLED=true
      - DEBUG=false
    volumes:
      - .:/app/root
      - ./backend/data:/app/data
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env.docker
    environment:
      CELERY_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      AUTH_ENABLED: "true"
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_MAPMYINDIA_API_KEY: ${VITE_MAPMYINDIA_API_KEY}
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
